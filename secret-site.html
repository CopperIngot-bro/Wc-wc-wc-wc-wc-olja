<!DOCTYPE html>
<html>
<body>
  <div id="c">...</div>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script>
    const cfg = JSON.parse(__firebase_config);
    firebase.initializeApp(cfg);
    const db = firebase.firestore();
    const id = typeof __app_id !== 'undefined' ? __app_id : 'c';
    const ref = db.collection('artifacts').doc(id).collection('public').doc('data').collection('s').doc('g');
    async function s() {
      if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
        await firebase.auth().signInWithCustomToken(__initial_auth_token);
      } else {
        await firebase.auth().signInAnonymously();
      }
      await ref.set({n: firebase.firestore.FieldValue.increment(1)}, {merge: true});
      ref.onSnapshot(d => {
        if (d.exists) document.getElementById('c').innerText = d.data().n;
      });
    }
    s();
  </script>
</body>
</html>
